<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 740" role="img" aria-labelledby="title desc">
  <title id="title">APCSNSC union emblem</title>
  <desc id="desc">A green and blue shield illustration with laurel accents and the APCSNSC logo centered.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f7a63"/>
      <stop offset="52%" stop-color="#13634d"/>
      <stop offset="100%" stop-color="#173f67"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#b9ffd8" stop-opacity="0.72"/>
      <stop offset="55%" stop-color="#7cf0b9" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7cf0b9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
