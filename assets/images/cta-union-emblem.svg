      <stop offset="100%" stop-color="#dff6ea"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b8e6e"/>
      <stop offset="100%" stop-color="#167653"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#08172a" flood-opacity="0.35"/>
    </filter>
  </defs>

